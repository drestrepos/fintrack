<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="FinTrack - Gestión de finanzas personales" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FinTrack" />

  <title>FinTrack</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1>FinTrack</h1>
    </header>

    <main id="app-main">
      <p>Cargando...</p>
    </main>

    <nav id="app-nav">
      <button data-view="dashboard">Inicio</button>
      <button data-view="transactions">Movimientos</button>
      <button data-view="budgets">Presupuesto</button>
      <button data-view="journal">Diario</button>
    </nav>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.error('SW error:', err));
    }
  </script>
</body>
</html>
